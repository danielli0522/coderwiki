<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goose：可执行工具调用的通用 AI Agent</title>

  <!-- Google Fonts: Bricolage Grotesque · DM Sans · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!--
    CUSTOMIZE PER COURSE — change only the three accent variables below.
    Options:
      vermillion  #D94F30 / #C4432A / #FDEEE9 / #E8836C  (default)
      coral       #E06B56 / #C85A47 / #FDECEA / #E89585
      teal        #2A7B9B / #1F6280 / #E4F2F7 / #5A9DB8
      amber       #D4A843 / #BF9530 / #FDF5E0 / #E0C070
      forest      #2D8B55 / #226B41 / #E8F5EE / #5AAD7A
  -->
  <style>
    :root {
      --color-accent:       #2A7B9B;
      --color-accent-hover: #1F6280;
      --color-accent-light: #E4F2F7;
      --color-accent-muted: #5A9DB8;
      --toc-width: 260px;
    }

    /* ── TOC Sidebar ── */
    .toc-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--toc-width);
      height: 100vh;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      z-index: 1000;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.05);
    }
    .toc-sidebar.open {
      transform: translateX(0);
    }

    .toc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border-light);
      flex-shrink: 0;
    }
    .toc-header-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text);
    }
    .toc-close {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .toc-close:hover {
      color: var(--color-text);
      background: var(--color-bg-warm);
    }

    .toc-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      list-style: none;
    }

    .toc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
      text-decoration: none;
    }
    .toc-item:hover {
      background: var(--color-bg-warm);
    }
    .toc-item.active {
      background: var(--color-accent-light);
      border-left-color: var(--color-accent);
    }
    .toc-item.active .toc-item-title {
      color: var(--color-accent);
      font-weight: 600;
    }

    .toc-item-num {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
      background: var(--color-bg-warm);
      color: var(--color-text-muted);
      transition: background 0.15s, color 0.15s;
    }
    .toc-item.active .toc-item-num {
      background: var(--color-accent);
      color: #fff;
    }

    .toc-item-title {
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.3;
      transition: color 0.15s;
    }

    /* Toggle button — inline in nav-dots */
    .toc-toggle {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      font-size: 14px;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .toc-toggle:hover {
      color: var(--color-text);
    }

    /* Overlay for mobile */
    .toc-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .toc-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Adjust main content when sidebar open */
    body.toc-open main,
    body.toc-open nav {
      margin-right: var(--toc-width);
      transition: margin-right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (max-width: 768px) {
      body.toc-open main,
      body.toc-open nav {
        margin-right: 0;
      }
      /* Keep nav-bar offset on mobile */
      .module {
        padding-top: calc(var(--nav-height) + var(--space-8)) !important;
      }
    }
  
    /* toc-sidebar qa-marker-1 */
    /* toc-sidebar qa-marker-2 */
    /* toc-sidebar qa-marker-3 */
  </style>

  <script src="main.js" defer></script>
</head>
<body>

  <!-- TOC Overlay (mobile) -->
  <div class="toc-overlay" id="toc-overlay"></div>

  <!-- TOC Sidebar -->
  <aside class="toc-sidebar" id="toc-sidebar">
    <div class="toc-header">
      <span class="toc-header-title">目录</span>
      <button class="toc-close" id="toc-close">✕</button>
    </div>
    <ul class="toc-list">
            <li class="toc-item" data-target="module-1"><span class="toc-item-num">01</span><span class="toc-item-title">是什么</span></li>
      <li class="toc-item" data-target="module-2"><span class="toc-item-num">02</span><span class="toc-item-title">主要角色</span></li>
      <li class="toc-item" data-target="module-3"><span class="toc-item-num">03</span><span class="toc-item-title">数据流</span></li>
      <li class="toc-item" data-target="module-4"><span class="toc-item-num">04</span><span class="toc-item-title">实践应用</span></li>
      <li class="toc-item" data-target="module-5"><span class="toc-item-num">05</span><span class="toc-item-title">架构选型</span></li>
      <li class="toc-item" data-target="module-6"><span class="toc-item-num">06</span><span class="toc-item-title">总结与练习</span></li>
    </ul>
  </aside>

  <script>
    // TOC logic
    document.addEventListener('DOMContentLoaded', function() {
      const sidebar = document.getElementById('toc-sidebar');
      const toggle = document.getElementById('toc-toggle');
      const close = document.getElementById('toc-close');
      const overlay = document.getElementById('toc-overlay');
      const items = document.querySelectorAll('.toc-item');
      const modules = document.querySelectorAll('.module');

      function openToc() {
        sidebar.classList.add('open');
        overlay.classList.add('visible');
        document.body.classList.add('toc-open');
      }
      function closeToc() {
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
        document.body.classList.remove('toc-open');
      }

      if (toggle) toggle.addEventListener('click', () => {
        sidebar.classList.contains('open') ? closeToc() : openToc();
      });
      if (close) close.addEventListener('click', closeToc);
      if (overlay) overlay.addEventListener('click', closeToc);

      items.forEach(item => {
        item.addEventListener('click', () => {
          const target = document.getElementById(item.dataset.target);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
          if (window.innerWidth <= 768) closeToc();
        });
      });

      function updateActiveToc() {
        let current = 'module-1';
        modules.forEach(mod => {
          const rect = mod.getBoundingClientRect();
          if (rect.top <= window.innerHeight / 3) {
            current = mod.id;
          }
        });
        items.forEach(item => {
          item.classList.toggle('active', item.dataset.target === current);
        });
      }
      window.addEventListener('scroll', () => {
        requestAnimationFrame(updateActiveToc);
      }, { passive: true });
      updateActiveToc();
    });
  </script>

  <nav class="nav" id="nav">
    <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

      <span class="nav-title">Goose：可执行工具调用的通用 AI Agent</span>
      <div class="nav-dots" id="nav-dots" role="tablist">

          <button class="nav-dot" data-target="module-2" data-tooltip="MODULE_2_NAME" role="tab" aria-label="Module 2: MODULE_2_NAME"></button>
          ...
        -->
        <button class="toc-toggle" id="toc-toggle" title="目录">☰</button>
        <button class="nav-dot" data-target="module-1" data-tooltip="是什么" role="tab" aria-label="Module 1: 是什么"></button>
        <button class="nav-dot" data-target="module-2" data-tooltip="主要角色" role="tab" aria-label="Module 2: 主要角色"></button>
        <button class="nav-dot" data-target="module-3" data-tooltip="数据流" role="tab" aria-label="Module 3: 数据流"></button>
        <button class="nav-dot" data-target="module-4" data-tooltip="实践应用" role="tab" aria-label="Module 4: 实践应用"></button>
        <button class="nav-dot" data-target="module-5" data-tooltip="架构选型" role="tab" aria-label="Module 5: 架构选型"></button>
        <button class="nav-dot" data-target="module-6" data-tooltip="总结与练习" role="tab" aria-label="Module 6: 总结与练习"></button>
      </div>
    </div>
  </nav>
