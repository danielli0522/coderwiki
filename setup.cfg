[flake8]
max-line-length = 120
exclude = 
    migrations,
    .git,
    __pycache__,
    build,
    dist,
    venv,
    env,
    .pytest_cache,
    .coverage,
    htmlcov
ignore = E203,W503
per-file-ignores = __init__.py:F401,*/migrations/*:F401,E501
max-complexity = 10

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --verbose --tb=short --cov=app --cov-report=html --cov-report=term-missing

[coverage:run]
source = app
omit = 
    */tests/*
    */venv/*
    */env/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError