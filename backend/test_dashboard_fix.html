<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Fix Test</title>
    <script>
        // Mock window object for component testing
        window.console = console;
        
        // Load component scripts in sequence
        async function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function testComponentLoading() {
            console.log('Testing component loading...');
            
            // Load components first
            const components = [
                '/static/js/components/stats.js',
                '/static/js/components/repository_list.js',
                '/static/js/components/task_progress.js',
                '/static/js/components/recent_activity.js',
                '/static/js/components/system_status.js'
            ];
            
            for (const component of components) {
                try {
                    await loadScript(`http://localhost:5001${component}`);
                    console.log(`✅ Loaded: ${component}`);
                } catch (error) {
                    console.error(`❌ Failed: ${component}`, error);
                }
            }
            
            // Check if components are defined
            const componentClasses = [
                'StatsComponent',
                'RepositoryListComponent', 
                'TaskProgressComponent',
                'RecentActivityComponent',
                'SystemStatusComponent'
            ];
            
            componentClasses.forEach(className => {
                if (typeof window[className] !== 'undefined') {
                    console.log(`✅ ${className} is available`);
                } else {
                    console.error(`❌ ${className} is NOT available`);
                }
            });
            
            // Now load dashboard
            try {
                await loadScript('http://localhost:5001/static/js/dashboard.js');
                console.log('✅ Dashboard loaded successfully');
            } catch (error) {
                console.error('❌ Dashboard loading failed:', error);
            }
        }
        
        // Run test when page loads
        window.addEventListener('load', testComponentLoading);
    </script>
</head>
<body>
    <h1>Dashboard Component Loading Test</h1>
    <p>Check console for results...</p>
    
    <!-- Mock dashboard elements -->
    <div class="stats-container">Stats Container</div>
    <div class="repository-list-container">Repository List Container</div>
    <div class="task-progress-container">Task Progress Container</div>
    <div class="recent-activity-container">Recent Activity Container</div>
    <div class="system-status-container">System Status Container</div>
</body>
</html>
