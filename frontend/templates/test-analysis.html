<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析功能测试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>分析功能测试页面</h1>
        <p>这是一个测试页面，用于验证分析功能的前端集成。</p>
        
        <div class="card">
            <div class="card-header">
                <h5>功能测试</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6>页面导航测试</h6>
                        <button class="btn btn-primary me-2" onclick="testNavigation('dashboard')">
                            <i class="fas fa-tachometer-alt me-1"></i>测试仪表板
                        </button>
                        <button class="btn btn-success me-2" onclick="testNavigation('repositories')">
                            <i class="fas fa-folder me-1"></i>测试仓库管理
                        </button>
                        <button class="btn btn-info me-2" onclick="testNavigation('analysis')">
                            <i class="fas fa-chart-line me-1"></i>测试分析页面
                        </button>
                    </div>
                    <div class="col-md-6">
                        <h6>API测试</h6>
                        <button class="btn btn-warning me-2" onclick="testAPI('analysis-types')">
                            <i class="fas fa-cogs me-1"></i>测试分析类型
                        </button>
                        <button class="btn btn-danger me-2" onclick="testAPI('health')">
                            <i class="fas fa-heartbeat me-1"></i>测试健康检查
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-header">
                <h5>测试结果</h5>
            </div>
            <div class="card-body">
                <div id="testResults"></div>
            </div>
        </div>
    </div>

    <script>
        function testNavigation(page) {
            const results = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            
            results.innerHTML += `
                <div class="alert alert-info">
                    <strong>${timestamp}</strong> - 测试页面导航: ${page}
                    <br>
                    <small>如果应用正在运行，可以访问相应的页面。</small>
                </div>
            `;
            
            // 滚动到结果区域
            results.scrollTop = results.scrollHeight;
        }
        
        async function testAPI(endpoint) {
            const results = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            
            results.innerHTML += `
                <div class="alert alert-warning">
                    <strong>${timestamp}</strong> - 测试API端点: ${endpoint}
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    正在测试...
                </div>
            `;
            
            try {
                const response = await fetch(`/api/analysis/${endpoint}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    results.innerHTML += `
                        <div class="alert alert-success">
                            <strong>${timestamp}</strong> - API测试成功: ${endpoint}
                            <br>
                            <small>响应数据: ${JSON.stringify(data, null, 2)}</small>
                        </div>
                    `;
                } else {
                    results.innerHTML += `
                        <div class="alert alert-danger">
                            <strong>${timestamp}</strong> - API测试失败: ${endpoint}
                            <br>
                            <small>错误: ${data.message || '未知错误'}</small>
                        </div>
                    `;
                }
                
            } catch (error) {
                results.innerHTML += `
                    <div class="alert alert-danger">
                        <strong>${timestamp}</strong> - API测试错误: ${endpoint}
                        <br>
                        <small>网络错误: ${error.message}</small>
                    </div>
                `;
            }
            
            // 滚动到结果区域
            results.scrollTop = results.scrollHeight;
        }
        
        // 页面加载时的欢迎信息
        document.addEventListener('DOMContentLoaded', function() {
            const results = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            
            results.innerHTML = `
                <div class="alert alert-primary">
                    <strong>${timestamp}</strong> - 分析功能测试页面已加载
                    <br>
                    <small>这个页面用于测试分析功能的前端集成。请确保后端服务正在运行。</small>
                </div>
            `;
        });
    </script>
</body>
</html>
