<!-- 仓库删除确认模态框 -->
<div class="modal fade" id="deleteRepositoryModal" tabindex="-1" aria-labelledby="deleteRepositoryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteRepositoryModalLabel">
                    <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                    确认删除仓库
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- 仓库基本信息 -->
                <div class="alert alert-warning" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <strong>警告：</strong>此操作不可撤销！
                </div>
                
                <div id="deleteRepositoryInfo">
                    <!-- 仓库信息将在这里动态加载 -->
                </div>
                
                <!-- 删除详情 -->
                <div id="deleteDetails" class="mt-3" style="display: none;">
                    <h6>将删除以下内容：</h6>
                    <ul class="list-unstyled">
                        <li id="documentsInfo" style="display: none;">
                            <i class="fas fa-file-alt text-danger me-2"></i>
                            <span id="documentsCount"></span>
                        </li>
                        <li id="tasksInfo" style="display: none;">
                            <i class="fas fa-tasks text-danger me-2"></i>
                            <span id="tasksCount"></span>
                        </li>
                        <li id="filesInfo" style="display: none;">
                            <i class="fas fa-folder text-danger me-2"></i>
                            <span id="filesCount"></span>
                        </li>
                    </ul>
                </div>
                
                <!-- 确认输入 -->
                <div class="mt-4">
                    <label for="deleteConfirmInput" class="form-label">
                        请输入仓库名称 <strong id="confirmRepoName"></strong> 以确认删除：
                    </label>
                    <input type="text" class="form-control" id="deleteConfirmInput" placeholder="输入仓库名称确认">
                    <div class="form-text">此操作不可撤销，请谨慎操作。</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times me-2"></i>取消
                </button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn" disabled>
                    <i class="fas fa-trash me-2"></i>确认删除
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 删除进度模态框 -->
<div class="modal fade" id="deleteProgressModal" tabindex="-1" aria-labelledby="deleteProgressModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteProgressModalLabel">
                    <i class="fas fa-spinner fa-spin me-2"></i>
                    正在删除仓库
                </h5>
            </div>
            <div class="modal-body">
                <div class="text-center">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">删除中...</span>
                    </div>
                    <p class="mb-0">正在删除仓库及其相关数据，请稍候...</p>
                    <div class="progress mt-3">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 删除成功提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="deleteSuccessToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="fas fa-check-circle text-success me-2"></i>
            <strong class="me-auto">删除成功</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            仓库及其相关数据已成功删除。
        </div>
    </div>
</div>

<!-- 删除失败提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11;">
    <div id="deleteErrorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="fas fa-exclamation-circle text-danger me-2"></i>
            <strong class="me-auto">删除失败</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            <span id="deleteErrorMessage">删除过程中发生错误，请稍后重试。</span>
        </div>
    </div>
</div>
