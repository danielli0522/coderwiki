
<!-- 删除成功提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="deleteSuccessToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="fas fa-check-circle text-success me-2"></i>
            <strong class="me-auto">删除成功</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            仓库及其相关数据已成功删除。
        </div>
    </div>
</div>

<!-- 删除失败提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11;">
    <div id="deleteErrorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="fas fa-exclamation-circle text-danger me-2"></i>
            <strong class="me-auto">删除失败</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            <span id="deleteErrorMessage">删除过程中发生错误，请稍后重试。</span>
        </div>
    </div>
</div>
