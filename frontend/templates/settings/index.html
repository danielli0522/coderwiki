{% extends "base.html" %}

{% block title %}系统设置 - CoderWiki{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">系统设置</h1>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <!-- 设置导航 -->
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">设置分类</h5>
                        </div>
                        <div class="list-group list-group-flush">
                            <a href="#profile" class="list-group-item list-group-item-action active" data-bs-toggle="list">
                                <i class="fas fa-user me-2"></i>个人资料
                            </a>
                            <a href="#security" class="list-group-item list-group-item-action" data-bs-toggle="list">
                                <i class="fas fa-shield-alt me-2"></i>安全设置
                            </a>
                            <a href="#notifications" class="list-group-item list-group-item-action" data-bs-toggle="list">
                                <i class="fas fa-bell me-2"></i>通知设置
                            </a>
                            <a href="#api" class="list-group-item list-group-item-action" data-bs-toggle="list">
                                <i class="fas fa-key me-2"></i>API设置
                            </a>
                            <a href="#appearance" class="list-group-item list-group-item-action" data-bs-toggle="list">
                                <i class="fas fa-palette me-2"></i>外观设置
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-9">
                    <!-- 设置内容 -->
                    <div class="tab-content">
                        <!-- 个人资料 -->
                        <div class="tab-pane fade show active" id="profile">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">个人资料</h5>
                                </div>
                                <div class="card-body">
                                    <form id="profileForm">
                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="mb-3">
                                                    <label for="username" class="form-label">用户名</label>
                                                    <input type="text" class="form-control" id="username" value="{{ current_user.username }}" readonly>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="mb-3">
                                                    <label for="email" class="form-label">邮箱</label>
                                                    <input type="email" class="form-control" id="email" value="{{ current_user.email }}">
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary">保存更改</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- 安全设置 -->
                        <div class="tab-pane fade" id="security">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">安全设置</h5>
                                </div>
                                <div class="card-body">
                                    <form id="passwordForm">
                                        <div class="mb-3">
                                            <label for="currentPassword" class="form-label">当前密码</label>
                                            <input type="password" class="form-control" id="currentPassword" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="newPassword" class="form-label">新密码</label>
                                            <input type="password" class="form-control" id="newPassword" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="confirmPassword" class="form-label">确认新密码</label>
                                            <input type="password" class="form-control" id="confirmPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-primary">更改密码</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- 通知设置 -->
                        <div class="tab-pane fade" id="notifications">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">通知设置</h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="emailNotifications" checked>
                                            <label class="form-check-label" for="emailNotifications">
                                                邮件通知
                                            </label>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="browserNotifications" checked>
                                            <label class="form-check-label" for="browserNotifications">
                                                浏览器通知
                                            </label>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="saveNotificationSettings">保存设置</button>
                                </div>
                            </div>
                        </div>

                        <!-- API设置 -->
                        <div class="tab-pane fade" id="api">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">API设置</h5>
                                </div>
                                <div class="card-body">
                                    <p class="text-muted">配置LLM API密钥和其他API设置</p>
                                    <button type="button" class="btn btn-primary" id="configureAPI">配置API</button>
                                </div>
                            </div>
                        </div>

                        <!-- 外观设置 -->
                        <div class="tab-pane fade" id="appearance">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">外观设置</h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="themeSelect" class="form-label">主题</label>
                                        <select class="form-select" id="themeSelect">
                                            <option value="light">浅色主题</option>
                                            <option value="dark">深色主题</option>
                                            <option value="auto">跟随系统</option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="saveAppearanceSettings">保存设置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
