{% extends "base.html" %}

{% block title %}代码分析 - CoderWiki{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <!-- 紧急导航修复 - 临时解决方案 -->
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                <div class="d-flex align-items-center">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <div class="flex-grow-1">
                        <strong>导航临时修复:</strong> 如果顶部导航无响应，请使用下面的快捷导航按钮
                    </div>
                    <div class="btn-group me-3">
                        <button type="button" class="btn btn-sm btn-outline-primary emergency-nav-btn" data-target="{{ url_for('main.dashboard') }}" title="快捷键: Alt+1">
                            <i class="fas fa-tachometer-alt"></i> 仪表板 <kbd>Alt+1</kbd>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-success emergency-nav-btn" data-target="{{ url_for('main.repositories') }}" title="快捷键: Alt+2">
                            <i class="fas fa-folder"></i> 仓库 <kbd>Alt+2</kbd>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary emergency-nav-btn" data-target="{{ url_for('main.documents') }}" title="快捷键: Alt+3">
                            <i class="fas fa-file-alt"></i> 文档 <kbd>Alt+3</kbd>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-success emergency-nav-btn" data-target="{{ url_for('main.tasks') }}" title="快捷键: Alt+4">
                            <i class="fas fa-tasks"></i> 任务 <kbd>Alt+4</kbd>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-dark emergency-nav-btn" data-target="{{ url_for('main.settings') }}" title="快捷键: Alt+5">
                            <i class="fas fa-cog"></i> 设置 <kbd>Alt+5</kbd>
                        </button>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">代码分析</h1>
                <button class="btn btn-primary" id="newAnalysisBtn">
                    <i class="fas fa-plus"></i> 新建分析
                </button>
            </div>

            <!-- 分析统计 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card bg-primary text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">总分析</h4>
                                    <h2 class="mb-0" id="totalAnalyses">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-chart-line fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">成功</h4>
                                    <h2 class="mb-0" id="successAnalyses">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-check-circle fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">进行中</h4>
                                    <h2 class="mb-0" id="runningAnalyses">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-clock fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-danger text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">失败</h4>
                                    <h2 class="mb-0" id="failedAnalyses">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-exclamation-triangle fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分析控制面板 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">分析控制</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="analysisRepoSelect" class="form-label">选择仓库</label>
                                <select class="form-select" id="analysisRepoSelect">
                                    <option value="">请选择仓库</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">分析类型</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="structureAnalysis" checked>
                                    <label class="form-check-label" for="structureAnalysis">结构分析</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="complexityAnalysis" checked>
                                    <label class="form-check-label" for="complexityAnalysis">复杂度分析</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="qualityAnalysis">
                                    <label class="form-check-label" for="qualityAnalysis">质量分析</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="securityAnalysis">
                                    <label class="form-check-label" for="securityAnalysis">安全分析</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button class="btn btn-primary" id="startAnalysisBtn">
                                <i class="fas fa-play"></i> 开始分析
                            </button>
                            <button class="btn btn-secondary" id="stopAnalysisBtn" style="display: none;">
                                <i class="fas fa-stop"></i> 停止分析
                            </button>
                            <button class="btn btn-info" id="refreshAnalysisBtn">
                                <i class="fas fa-sync"></i> 刷新
                            </button>
                            <button class="btn btn-warning" id="clearCacheBtn">
                                <i class="fas fa-trash"></i> 清除缓存
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 加载指示器 -->
            <div id="analysisLoading" class="text-center" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2">正在加载分析结果...</p>
            </div>

            <!-- 分析结果容器 -->
            <div id="analysisResults" style="display: none;">
                <!-- 分析结果将在这里动态加载 -->
            </div>

            <!-- 空状态容器 -->
            <div id="analysisEmpty" class="text-center">
                <i class="fas fa-chart-bar fa-4x text-muted mb-3"></i>
                <h4 class="text-muted">暂无分析结果</h4>
                <p class="text-muted">选择一个仓库并开始分析以查看结果</p>
                <button class="btn btn-primary" id="startFirstAnalysisBtn">
                    <i class="fas fa-plus"></i> 开始第一个分析
                </button>
            </div>

            <!-- 分析历史 -->
            <div class="card mt-4">
                <div class="card-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">分析历史</h5>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm" placeholder="搜索分析..." id="analysisSearch">
                            <select class="form-select form-select-sm" id="analysisStatusFilter">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="running">进行中</option>
                                <option value="completed">已完成</option>
                                <option value="failed">失败</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div id="analysisHistory">
                        <!-- 分析历史将在这里动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 分析进度模态框 -->
<div class="modal fade" id="analysisProgressModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">分析进度</h5>
            </div>
            <div class="modal-body">
                <div class="progress mb-3">
                    <div class="progress-bar progress-bar-striped progress-bar-animated"
                         id="analysisProgressBar" role="progressbar" style="width: 0%"></div>
                </div>
                <p id="analysisProgressText">准备开始分析...</p>
                <div id="analysisProgressDetails"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelAnalysisBtn">取消分析</button>
            </div>
        </div>
    </div>
</div>

<!-- 新建分析模态框 -->
<div class="modal fade" id="newAnalysisModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新建代码分析</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newAnalysisForm">
                    <div class="mb-3">
                        <label for="analysisRepo" class="form-label">选择仓库</label>
                        <select class="form-select" id="analysisRepo" required>
                            <option value="">请选择仓库</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分析类型</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="modalStructureAnalysis" checked>
                            <label class="form-check-label" for="modalStructureAnalysis">结构分析</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="modalComplexityAnalysis" checked>
                            <label class="form-check-label" for="modalComplexityAnalysis">复杂度分析</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="modalQualityAnalysis">
                            <label class="form-check-label" for="modalQualityAnalysis">质量分析</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="modalSecurityAnalysis">
                            <label class="form-check-label" for="modalSecurityAnalysis">安全分析</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="analysisConfig" class="form-label">分析配置</label>
                        <textarea class="form-control" id="analysisConfig" rows="3" placeholder="可选的分析配置参数（JSON格式）"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="modalStartAnalysisBtn">开始分析</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/analysis.js') }}"></script>
<script>
// 初始化分析管理器和终极导航修复
document.addEventListener('DOMContentLoaded', function() {
    console.log('Analysis page loaded');
    
    // 终极紧急导航修复 - 多重备用方案
    setTimeout(function() {
        console.log('Applying ultimate navigation fix...');
        
        // 方案1: 直接处理data-target按钮
        const emergencyButtons = document.querySelectorAll('.emergency-nav-btn');
        console.log('Found emergency navigation buttons:', emergencyButtons.length);
        
        emergencyButtons.forEach((button, index) => {
            const targetUrl = button.getAttribute('data-target');
            console.log(`Button ${index} target URL:`, targetUrl);
            
            if (targetUrl) {
                // 使用多种事件类型，最高优先级
                ['mousedown', 'click', 'touchstart', 'keydown'].forEach(eventType => {
                    button.addEventListener(eventType, function(e) {
                        console.log(`Ultimate navigation triggered via ${eventType} to:`, targetUrl);
                        e.preventDefault();
                        e.stopPropagation();
                        e.stopImmediatePropagation();
                        
                        // 强制导航
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 0);
                    }, true);
                });
                
                // 双击保险
                button.addEventListener('dblclick', function(e) {
                    console.log('Double-click fallback navigation to:', targetUrl);
                    window.location.href = targetUrl;
                }, true);
            }
        });
        
        // 方案2: 键盘快捷键导航
        document.addEventListener('keydown', function(e) {
            if (e.altKey) {
                let targetUrl = null;
                switch(e.code) {
                    case 'Digit1':
                        targetUrl = '/dashboard';
                        break;
                    case 'Digit2':
                        targetUrl = '/repositories';
                        break;
                    case 'Digit3':
                        targetUrl = '/documents';
                        break;
                    case 'Digit4':
                        targetUrl = '/tasks';
                        break;
                    case 'Digit5':
                        targetUrl = '/settings';
                        break;
                }
                
                if (targetUrl) {
                    console.log('Keyboard navigation to:', targetUrl);
                    e.preventDefault();
                    window.location.href = targetUrl;
                }
            }
        });
        
        console.log('Ultimate navigation fix applied with keyboard shortcuts');
    }, 500);
});
</script>
{% endblock %}
