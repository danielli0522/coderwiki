{% extends "base.html" %}

{% block title %}任务管理 - CoderWiki{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">任务管理</h1>
                <button class="btn btn-primary" id="addTaskBtn">
                    <i class="fas fa-plus"></i> 新建任务
                </button>
            </div>

            <!-- 任务统计 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card bg-primary text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">总任务</h4>
                                    <h2 class="mb-0" id="totalTasksCount">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-tasks fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">进行中</h4>
                                    <h2 class="mb-0" id="runningTasksCount">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-clock fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">已完成</h4>
                                    <h2 class="mb-0" id="completedTasksCount">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-check-circle fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-danger text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h4 class="card-title">失败</h4>
                                    <h2 class="mb-0" id="failedTasksCount">0</h2>
                                </div>
                                <div class="align-self-center">
                                    <i class="fas fa-exclamation-triangle fa-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="card">
                <div class="card-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">任务列表</h5>
                        <div class="d-flex gap-2">
                            <div class="input-group" style="width: 200px;">
                                <span class="input-group-text">
                                    <i class="fas fa-search"></i>
                                </span>
                                <input type="text" class="form-control form-control-sm" placeholder="搜索任务..." id="taskSearch">
                            </div>
                            <select class="form-select form-select-sm" style="width: 120px;" id="taskStatusFilter">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="running">进行中</option>
                                <option value="completed">已完成</option>
                                <option value="failed">失败</option>
                                <option value="cancelled">已取消</option>
                            </select>
                            <button class="btn btn-success btn-sm" id="refreshTasksBtn" title="刷新任务列表">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th style="width: 5%;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="selectAllTasks">
                                        </div>
                                    </th>
                                    <th style="width: 30%;">任务名称</th>
                                    <th style="width: 15%;">状态</th>
                                    <th style="width: 10%;">优先级</th>
                                    <th style="width: 20%;">创建时间</th>
                                    <th style="width: 20%;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <tr>
                                    <td colspan="6" class="text-center text-muted">
                                        <div class="task-loading">
                                            <i class="fas fa-spinner fa-spin"></i>
                                            <p>正在加载任务...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <nav aria-label="任务分页" id="taskPagination" style="display: none;">
                        <ul class="pagination justify-content-center">
                            <li class="page-item disabled">
                                <a class="page-link" href="#" tabindex="-1">上一页</a>
                            </li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#">3</a></li>
                            <li class="page-item">
                                <a class="page-link" href="#">下一页</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

            <!-- 批量操作 -->
            <div class="card mt-3" id="bulkActions" style="display: none;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted">已选择 <span id="selectedCount">0</span> 个任务</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-outline-danger btn-sm" id="bulkDeleteBtn">
                                <i class="fas fa-trash"></i> 批量删除
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" id="clearSelectionBtn">
                                <i class="fas fa-times"></i> 清除选择
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/task.js') }}"></script>
{% endblock %}
