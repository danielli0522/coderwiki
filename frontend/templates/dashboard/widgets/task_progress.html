<div class="task-progress-container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">
                <i class="fas fa-tasks me-2"></i>任务进度
            </h5>
            <div class="d-flex gap-2">
                <select class="form-select" id="taskStatusFilter" style="width: 150px;">
                    <option value="">全部状态</option>
                    <option value="pending">待处理</option>
                    <option value="running">运行中</option>
                    <option value="completed">已完成</option>
                    <option value="failed">失败</option>
                    <option value="cancelled">已取消</option>
                </select>
                <button class="btn btn-outline-secondary" id="refreshTasksBtn">
                    <i class="fas fa-sync-alt me-2"></i>刷新
                </button>
            </div>
        </div>
        <div class="card-body">
            <div id="taskListContainer">
                <!-- 任务列表将由JavaScript动态生成 -->
                <div class="text-center py-5" id="emptyTaskState">
                    <i class="fas fa-tasks fa-4x text-muted mb-3"></i>
                    <h5 class="text-muted">暂无任务</h5>
                    <p class="text-muted">当前没有正在运行的任务</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 任务项模板 -->
<template id="taskItemTemplate">
    <div class="task-item card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="d-flex align-items-center">
                        <div class="task-icon me-3">
                            <i class="fas fa-cog fa-spin"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h6 class="task-title mb-1"></h6>
                            <p class="task-description text-muted mb-0 small"></p>
                            <div class="task-meta">
                                <span class="badge task-status-badge me-2"></span>
                                <small class="text-muted me-2"></small>
                                <small class="text-muted"></small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="task-progress">
                        <div class="progress mb-2">
                            <div class="progress-bar task-progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">进度</small>
                            <small class="task-percentage">0%</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="task-actions">
                        <button class="btn btn-sm btn-outline-info me-1 view-task-btn" title="查看详情">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-warning me-1 cancel-task-btn" title="取消任务">
                            <i class="fas fa-stop"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger retry-task-btn" title="重试任务">
                            <i class="fas fa-redo"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
