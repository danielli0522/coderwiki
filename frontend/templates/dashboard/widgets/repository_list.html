<div class="repository-list-container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">
                <i class="fas fa-folder me-2"></i>仓库列表
            </h5>
            <div class="d-flex gap-2">
                <div class="input-group" style="width: 250px;">
                    <input type="text" class="form-control" id="repoSearchInput" placeholder="搜索仓库...">
                    <button class="btn btn-outline-secondary" type="button" id="repoSearchBtn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <select class="form-select" id="repoStatusFilter" style="width: 150px;">
                    <option value="">全部状态</option>
                    <option value="active">活跃</option>
                    <option value="inactive">非活跃</option>
                    <option value="error">错误</option>
                    <option value="cloning">克隆中</option>
                    <option value="analyzing">分析中</option>
                </select>
                <button class="btn btn-primary" id="addRepoBtn">
                    <i class="fas fa-plus me-2"></i>添加仓库
                </button>
            </div>
        </div>
        <div class="card-body">
            <div id="repositoryListContainer">
                <!-- 仓库列表将由JavaScript动态生成 -->
                <div class="text-center py-5" id="emptyRepoState">
                    <i class="fas fa-folder-open fa-4x text-muted mb-3"></i>
                    <h5 class="text-muted">暂无仓库</h5>
                    <p class="text-muted">点击"添加仓库"按钮开始添加您的第一个代码仓库</p>
                </div>
            </div>

            <!-- 分页控件 -->
            <nav aria-label="仓库列表分页" id="repoPaginationContainer" style="display: none;">
                <ul class="pagination justify-content-center" id="repoPagination">
                    <!-- 分页按钮将由JavaScript动态生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 仓库项模板 -->
<template id="repositoryItemTemplate">
    <div class="repository-item card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="d-flex align-items-center">
                        <div class="repository-avatar me-3">
                            <i class="fab fa-github fa-2x"></i>
                        </div>
                        <div>
                            <h6 class="repository-name mb-1"></h6>
                            <p class="repository-description text-muted mb-0 small"></p>
                            <div class="repository-meta">
                                <span class="badge bg-primary me-1"></span>
                                <small class="text-muted me-2"></small>
                                <small class="text-muted"></small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="repository-stats">
                        <div class="stat-item">
                            <i class="fas fa-code-branch me-1"></i>
                            <span class="branch-count"></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-file-code me-1"></i>
                            <span class="file-count"></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-file-alt me-1"></i>
                            <span class="doc-count"></span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="repository-actions">
                        <button class="btn btn-sm btn-outline-primary me-1 generate-doc-btn" title="生成文档">
                            <i class="fas fa-file-export"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-info me-1 view-repo-btn" title="查看详情">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-warning me-1 edit-repo-btn" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <!-- 删除仓库功能已禁用 -->
                        <!--
                        <button class="btn btn-sm btn-outline-danger delete-repo-btn" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                        -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
