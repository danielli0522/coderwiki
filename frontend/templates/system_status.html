<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统状态 - CoderWiki</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/components.css') }}" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .system-status-page {
            min-height: 100vh;
            padding: 15px;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            margin-bottom: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .page-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            opacity: 0.9;
            margin: 0;
        }

        .status-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .status-card .card-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 15px 20px;
        }

        .status-card .card-body {
            padding: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 500;
            color: #495057;
            min-width: 80px;
        }

        .info-value {
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .progress {
            height: 8px;
            border-radius: 4px;
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .usage-text {
            min-width: 40px;
            text-align: right;
        }

        .service-item {
            padding: 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .service-item:hover {
            background: #e9ecef;
            transition: background-color 0.2s;
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .service-status {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }

        .last-updated {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 20px;
            padding: 10px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e9ecef;
        }

        .alert {
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .badge {
            font-size: 0.8rem;
            padding: 4px 8px;
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .system-status-page {
                padding: 10px;
            }

            .page-header {
                padding: 15px 0;
                margin-bottom: 15px;
            }

            .status-card .card-header {
                padding: 12px 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .status-card .card-body {
                padding: 15px;
            }

            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .info-value {
                width: 100%;
                justify-content: space-between;
            }

            .progress-container {
                width: 100%;
                justify-content: space-between;
            }

            .progress {
                max-width: none;
                flex: 1;
            }

            .service-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .service-status {
                width: 100%;
                justify-content: space-between;
            }

            .refresh-btn {
                width: 100%;
                margin-top: 10px;
            }
        }

        @media (max-width: 576px) {
            .page-title {
                font-size: 1.8rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .info-label {
                min-width: auto;
                font-size: 0.9rem;
            }

            .usage-text {
                min-width: auto;
                font-size: 0.9rem;
            }

            .progress {
                height: 6px;
            }
        }

        /* 状态颜色 */
        .badge.bg-success {
            background-color: #28a745 !important;
        }

        .badge.bg-warning {
            background-color: #ffc107 !important;
            color: #212529 !important;
        }

        .badge.bg-danger {
            background-color: #dc3545 !important;
        }

        .progress-bar.bg-success {
            background-color: #28a745 !important;
        }

        .progress-bar.bg-warning {
            background-color: #ffc107 !important;
        }

        .progress-bar.bg-danger {
            background-color: #dc3545 !important;
        }
    </style>
</head>
<body>
    <div class="system-status-page">
        <div class="container-fluid">
            <!-- 页面头部 -->
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-heartbeat me-2 me-md-3"></i>
                    系统状态监控
                </h1>
                <p class="page-subtitle">实时监控系统运行状态和资源使用情况</p>
            </div>

            <!-- 系统状态组件 -->
            <div class="row">
                <div class="col-12">
                    <div class="status-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-server me-2"></i>系统概览
                            </h5>
                            <button class="btn refresh-btn" id="refreshSystemStatusBtn">
                                <i class="fas fa-sync-alt me-2"></i>刷新
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <!-- 系统概览 -->
                                <div class="col-lg-6 col-md-12 mb-4">
                                    <div class="system-overview">
                                        <h6 class="section-title">系统概览</h6>
                                        <div class="system-info">
                                            <div class="info-item">
                                                <span class="info-label">系统状态:</span>
                                                <span class="info-value">
                                                    <span class="badge system-status-badge" id="systemOverallStatus">正常</span>
                                                </span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">运行时间:</span>
                                                <span class="info-value" id="systemUptime">0天 0小时 0分钟</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">CPU使用率:</span>
                                                <span class="info-value">
                                                    <span class="usage-text" id="cpuUsage">0%</span>
                                                    <div class="progress-container">
                                                        <div class="progress">
                                                            <div class="progress-bar" id="cpuProgressBar" role="progressbar" style="width: 0%"></div>
                                                        </div>
                                                    </div>
                                                </span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">内存使用率:</span>
                                                <span class="info-value">
                                                    <span class="usage-text" id="memoryUsage">0%</span>
                                                    <div class="progress-container">
                                                        <div class="progress">
                                                            <div class="progress-bar" id="memoryProgressBar" role="progressbar" style="width: 0%"></div>
                                                        </div>
                                                    </div>
                                                </span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">磁盘使用率:</span>
                                                <span class="info-value">
                                                    <span class="usage-text" id="diskUsage">0%</span>
                                                    <div class="progress-container">
                                                        <div class="progress">
                                                            <div class="progress-bar" id="diskProgressBar" role="progressbar" style="width: 0%"></div>
                                                        </div>
                                                    </div>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- 服务状态 -->
                                <div class="col-lg-6 col-md-12">
                                    <div class="service-status">
                                        <h6 class="section-title">服务状态</h6>
                                        <div class="service-list" id="serviceList">
                                            <!-- 服务状态将由JavaScript动态生成 -->
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 系统告警 -->
                            <div class="row mt-4">
                                <div class="col-12">
                                    <div class="system-alerts">
                                        <h6 class="section-title">系统告警</h6>
                                        <div id="systemAlerts">
                                            <div class="alert alert-info" role="alert">
                                                <i class="fas fa-info-circle me-2"></i>
                                                系统运行正常，暂无告警信息
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 最后更新时间 -->
                            <div class="last-updated">
                                <i class="fas fa-clock me-1"></i>
                                最后更新: <span id="lastUpdated">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 服务项模板 -->
    <template id="serviceItemTemplate">
        <div class="service-item">
            <div class="service-info">
                <i class="service-icon"></i>
                <span class="service-name"></span>
            </div>
            <div class="service-status">
                <span class="badge service-status-badge"></span>
                <small class="text-muted service-response-time"></small>
            </div>
        </div>
    </template>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- System Status Component -->
    <script src="{{ url_for('static', filename='js/components/system_status.js') }}"></script>

    <script>
        // 初始化系统状态组件
        document.addEventListener('DOMContentLoaded', function() {
            const systemStatus = new SystemStatusComponent();

            // 更新最后更新时间
            function updateLastUpdated() {
                const now = new Date();
                document.getElementById('lastUpdated').textContent = now.toLocaleString('zh-CN');
            }

            // 初始更新
            updateLastUpdated();

            // 每次刷新时更新
            document.getElementById('refreshSystemStatusBtn').addEventListener('click', function() {
                setTimeout(updateLastUpdated, 1000);
            });
        });
    </script>
</body>
</html>
