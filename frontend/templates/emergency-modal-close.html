<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急关闭模态框 - CoderWiki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emergency-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        .btn-emergency {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-emergency:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
            color: white;
        }
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .status-active {
            background-color: #ff6b6b;
            animation: pulse 2s infinite;
        }
        .status-resolved {
            background-color: #51cf66;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="emergency-card">
        <div class="text-center mb-4">
            <i class="fas fa-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
            <h2 class="mt-3">紧急模态框关闭工具</h2>
            <p class="text-muted">用于解决模态框无法关闭的问题</p>
        </div>

        <div class="alert alert-warning" role="alert">
            <i class="fas fa-info-circle me-2"></i>
            <strong>问题描述：</strong>进入仓库管理界面时，删除仓库的模态框自动弹出且无法关闭。
        </div>

        <div class="mb-4">
            <h5>当前状态：</h5>
            <div id="modalStatus">
                <span class="status-indicator status-active"></span>
                <span>正在检测模态框状态...</span>
            </div>
        </div>

        <div class="d-grid gap-3">
            <button class="btn btn-emergency" onclick="forceCloseAllModals()">
                <i class="fas fa-times-circle me-2"></i>
                强制关闭所有模态框
            </button>

            <button class="btn btn-outline-danger" onclick="forceCloseDeleteProgressModal()">
                <i class="fas fa-trash me-2"></i>
                专门关闭删除进度模态框
            </button>

            <button class="btn btn-outline-secondary" onclick="refreshPage()">
                <i class="fas fa-redo me-2"></i>
                刷新页面
            </button>

            <a href="/repository" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left me-2"></i>
                返回仓库管理
            </a>
        </div>

        <div class="mt-4">
            <h6>键盘快捷键：</h6>
            <ul class="list-unstyled">
                <li><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>M</kbd> - 强制关闭所有模态框</li>
                <li><kbd>ESC</kbd> - 关闭当前模态框</li>
            </ul>
        </div>

        <div class="mt-4 p-3 bg-light rounded">
            <h6>问题原因：</h6>
            <p class="mb-2">删除进度模态框设置了 <code>data-bs-backdrop="static"</code>，这意味着：</p>
            <ul class="mb-0">
                <li>无法通过点击背景关闭</li>
                <li>无法通过ESC键关闭</li>
                <li>只能通过程序代码关闭</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 强制关闭所有模态框
        function forceCloseAllModals() {
            console.log('强制关闭所有模态框...');

            // 关闭所有Bootstrap模态框
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                const bsModal = bootstrap.Modal.getInstance(modal);
                if (bsModal) {
                    bsModal.hide();
                }
            });

            // 移除所有模态框的show类
            const visibleModals = document.querySelectorAll('.modal.show');
            visibleModals.forEach(modal => {
                modal.classList.remove('show');
                modal.style.display = 'none';
            });

            // 移除模态框背景
            const backdrops = document.querySelectorAll('.modal-backdrop');
            backdrops.forEach(backdrop => {
                backdrop.remove();
            });

            // 恢复body的滚动
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';

            updateStatus();
            console.log('所有模态框已强制关闭');
        }

        // 特别处理删除进度模态框
        function forceCloseDeleteProgressModal() {
            console.log('强制关闭删除进度模态框...');

            const progressModal = document.getElementById('deleteProgressModal');
            if (progressModal) {
                // 获取Bootstrap模态框实例
                const bsModal = bootstrap.Modal.getInstance(progressModal);
                if (bsModal) {
                    bsModal.hide();
                }

                // 强制移除show类
                progressModal.classList.remove('show');
                progressModal.style.display = 'none';

                // 移除模态框背景
                const backdrops = document.querySelectorAll('.modal-backdrop');
                backdrops.forEach(backdrop => {
                    backdrop.remove();
                });

                // 恢复body的滚动
                document.body.classList.remove('modal-open');
                document.body.style.overflow = '';
                document.body.style.paddingRight = '';

                updateStatus();
                console.log('删除进度模态框已强制关闭');
            }
        }

        // 刷新页面
        function refreshPage() {
            window.location.reload();
        }

        // 更新状态显示
        function updateStatus() {
            const statusElement = document.getElementById('modalStatus');
            const visibleModals = document.querySelectorAll('.modal.show');

            if (visibleModals.length === 0) {
                statusElement.innerHTML = `
                    <span class="status-indicator status-resolved"></span>
                    <span class="text-success">所有模态框已关闭</span>
                `;
            } else {
                statusElement.innerHTML = `
                    <span class="status-indicator status-active"></span>
                    <span class="text-danger">仍有 ${visibleModals.length} 个模态框打开</span>
                `;
            }
        }

        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(updateStatus, 500);
        });

        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            // Ctrl+Shift+M 强制关闭所有模态框
            if (e.ctrlKey && e.shiftKey && e.key === 'M') {
                e.preventDefault();
                forceCloseAllModals();
            }

            // ESC键关闭模态框
            if (e.key === 'Escape') {
                const visibleModals = document.querySelectorAll('.modal.show');
                if (visibleModals.length > 0) {
                    forceCloseAllModals();
                }
            }
        });

        // 定期检查状态
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
