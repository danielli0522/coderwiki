{% extends "base.html" %}

{% block title %}联系我们 - CoderWiki{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-4">联系我们</h1>

            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h3>联系信息</h3>
                            <p><strong>邮箱:</strong> contact@coderwiki.com</p>
                            <p><strong>技术支持:</strong> support@coderwiki.com</p>
                            <p><strong>项目地址:</strong> <a href="https://github.com/coderwiki" target="_blank">GitHub</a></p>

                            <h4>工作时间</h4>
                            <p>周一至周五: 9:00 - 18:00</p>
                            <p>周末: 10:00 - 16:00</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h3>反馈建议</h3>
                            <form>
                                <div class="mb-3">
                                    <label for="name" class="form-label">姓名</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="subject" class="form-label">主题</label>
                                    <input type="text" class="form-control" id="subject" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">消息</label>
                                    <textarea class="form-control" id="message" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">发送消息</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
