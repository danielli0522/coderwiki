<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航链接测试 - CoderWiki</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .test-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .test-error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .test-info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-code"></i> CoderWiki
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="fas fa-tachometer-alt"></i> 仪表板
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/repositories">
                            <i class="fas fa-folder"></i> 仓库管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/documents">
                            <i class="fas fa-file-alt"></i> 文档管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analysis">
                            <i class="fas fa-chart-line"></i> 代码分析
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks">
                            <i class="fas fa-tasks"></i> 任务管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">
                            <i class="fas fa-cog"></i> 系统设置
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container mt-4">
        <h1>导航链接测试页面</h1>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>导航链接测试</h5>
                    </div>
                    <div class="card-body">
                        <div id="test-results">
                            <div class="test-info">
                                <strong>测试说明：</strong>点击下面的导航链接，测试是否能正常跳转。
                            </div>
                        </div>

                        <div class="mt-3">
                            <h6>测试链接：</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <a href="/dashboard" class="btn btn-outline-primary" onclick="testNavigation(this, '/dashboard')">
                                    <i class="fas fa-tachometer-alt"></i> 仪表板
                                </a>
                                <a href="/repositories" class="btn btn-outline-primary" onclick="testNavigation(this, '/repositories')">
                                    <i class="fas fa-folder"></i> 仓库管理
                                </a>
                                <a href="/documents" class="btn btn-outline-primary" onclick="testNavigation(this, '/documents')">
                                    <i class="fas fa-file-alt"></i> 文档管理
                                </a>
                                <a href="/analysis" class="btn btn-outline-primary" onclick="testNavigation(this, '/analysis')">
                                    <i class="fas fa-chart-line"></i> 代码分析
                                </a>
                                <a href="/tasks" class="btn btn-outline-primary" onclick="testNavigation(this, '/tasks')">
                                    <i class="fas fa-tasks"></i> 任务管理
                                </a>
                                <a href="/settings" class="btn btn-outline-primary" onclick="testNavigation(this, '/settings')">
                                    <i class="fas fa-cog"></i> 系统设置
                                </a>
                            </div>
                        </div>

                        <div class="mt-3">
                            <button class="btn btn-success" onclick="runAllTests()">
                                <i class="fas fa-play"></i> 运行所有测试
                            </button>
                            <button class="btn btn-info" onclick="clearResults()">
                                <i class="fas fa-trash"></i> 清除结果
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>调试信息</h5>
                    </div>
                    <div class="card-body">
                        <div id="debug-info">
                            <p><strong>当前页面：</strong> <span id="current-url"></span></p>
                            <p><strong>导航链接数量：</strong> <span id="nav-count"></span></p>
                            <p><strong>点击事件：</strong> <span id="click-events">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let clickCount = 0;

        // 更新调试信息
        function updateDebugInfo() {
            document.getElementById('current-url').textContent = window.location.href;
            document.getElementById('nav-count').textContent = document.querySelectorAll('.navbar-nav .nav-link').length;
            document.getElementById('click-events').textContent = clickCount;
        }

        // 测试导航链接
        function testNavigation(element, url) {
            clickCount++;
            updateDebugInfo();

            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-info';
            resultDiv.innerHTML = `
                <strong>测试链接：</strong> ${element.textContent.trim()}<br>
                <strong>目标URL：</strong> ${url}<br>
                <strong>时间：</strong> ${new Date().toLocaleTimeString()}<br>
                <strong>状态：</strong> 正在测试...
            `;

            document.getElementById('test-results').appendChild(resultDiv);

            // 模拟点击测试
            setTimeout(() => {
                try {
                    // 检查链接是否有效
                    if (element.href && element.href !== window.location.href) {
                        resultDiv.className = 'test-success';
                        resultDiv.innerHTML = `
                            <strong>测试链接：</strong> ${element.textContent.trim()}<br>
                            <strong>目标URL：</strong> ${url}<br>
                            <strong>时间：</strong> ${new Date().toLocaleTimeString()}<br>
                            <strong>状态：</strong> ✅ 链接有效，可以跳转
                        `;
                    } else {
                        resultDiv.className = 'test-error';
                        resultDiv.innerHTML = `
                            <strong>测试链接：</strong> ${element.textContent.trim()}<br>
                            <strong>目标URL：</strong> ${url}<br>
                            <strong>时间：</strong> ${new Date().toLocaleTimeString()}<br>
                            <strong>状态：</strong> ❌ 链接无效或无法跳转
                        `;
                    }
                } catch (error) {
                    resultDiv.className = 'test-error';
                    resultDiv.innerHTML = `
                        <strong>测试链接：</strong> ${element.textContent.trim()}<br>
                        <strong>目标URL：</strong> ${url}<br>
                        <strong>时间：</strong> ${new Date().toLocaleTimeString()}<br>
                        <strong>状态：</strong> ❌ 测试出错：${error.message}
                    `;
                }
            }, 1000);
        }

        // 运行所有测试
        function runAllTests() {
            const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
            navLinks.forEach((link, index) => {
                setTimeout(() => {
                    testNavigation(link, link.href);
                }, index * 500);
            });
        }

        // 清除结果
        function clearResults() {
            const results = document.querySelectorAll('.test-results .test-info, .test-results .test-success, .test-results .test-error');
            results.forEach(result => {
                if (result.querySelector('strong')?.textContent !== '测试说明：') {
                    result.remove();
                }
            });
            clickCount = 0;
            updateDebugInfo();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateDebugInfo();

            // 监听导航链接点击
            document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    clickCount++;
                    updateDebugInfo();
                    console.log('导航链接被点击:', this.textContent.trim(), this.href);
                });
            });
        });
    </script>
</body>
</html>
