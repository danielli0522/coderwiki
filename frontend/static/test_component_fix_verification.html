<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组件重复声明修复验证</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        #results { margin-top: 20px; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>组件重复声明修复验证</h1>

    <div>
        <button onclick="testComponentLoading()">测试组件加载</button>
        <button onclick="testDuplicateLoading()">测试重复加载</button>
        <button onclick="clearResults()">清空结果</button>
    </div>

    <div id="results"></div>

    <script>
        const results = [];

        function logResult(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const result = { message, type, timestamp };
            results.push(result);

            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            resultsDiv.appendChild(resultDiv);

            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearResults() {
            results.length = 0;
            document.getElementById('results').innerHTML = '';
        }

        async function testComponentLoading() {
            logResult('开始测试组件加载...', 'info');

            try {
                // 加载组件注册表
                await loadScript('/static/js/components/component_loader.js');
                logResult('✅ 组件注册表加载成功', 'success');

                // 加载所有组件
                const components = [
                    '/static/js/components/stats.js',
                    '/static/js/components/repository_list.js',
                    '/static/js/components/task_progress.js',
                    '/static/js/components/recent_activity.js',
                    '/static/js/components/system_status.js'
                ];

                for (const script of components) {
                    await loadScript(script);
                    logResult(`✅ 组件脚本加载成功: ${script}`, 'success');
                }

                // 检查组件是否可用
                setTimeout(() => {
                    checkComponentAvailability();
                }, 1000);

            } catch (error) {
                logResult(`❌ 组件加载失败: ${error.message}`, 'error');
            }
        }

        async function testDuplicateLoading() {
            logResult('开始测试重复加载...', 'info');

            try {
                // 第一次加载
                logResult('第一次加载组件...', 'info');
                await testComponentLoading();

                // 等待一秒后再次加载
                setTimeout(async () => {
                    logResult('第二次加载组件（应该跳过重复声明）...', 'info');
                    await testComponentLoading();

                    // 检查是否有重复声明警告
                    setTimeout(() => {
                        checkForDuplicateWarnings();
                    }, 1000);
                }, 1000);

            } catch (error) {
                logResult(`❌ 重复加载测试失败: ${error.message}`, 'error');
            }
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Failed to load ${src}`));
                document.head.appendChild(script);
            });
        }

        function checkComponentAvailability() {
            logResult('检查组件可用性...', 'info');

            const components = [
                'StatsComponent',
                'RepositoryListComponent',
                'TaskProgressComponent',
                'RecentActivityComponent',
                'SystemStatusComponent',
                'ComponentRegistry',
                'ComponentLoader'
            ];

            components.forEach(component => {
                if (typeof window[component] !== 'undefined') {
                    logResult(`✅ ${component} 可用`, 'success');
                } else {
                    logResult(`❌ ${component} 不可用`, 'error');
                }
            });

            // 检查组件注册表
            if (window.ComponentRegistry) {
                const registeredComponents = window.ComponentRegistry.list();
                logResult(`📋 已注册组件: ${registeredComponents.join(', ')}`, 'info');
            }
        }

        function checkForDuplicateWarnings() {
            logResult('检查重复声明警告...', 'info');

            // 这里可以通过检查控制台日志来验证
            // 在实际应用中，可以添加一个全局的警告收集器
            logResult('请检查浏览器控制台是否有重复声明警告', 'warning');
            logResult('如果没有看到 "already declared, skipping..." 警告，说明修复成功！', 'success');
        }

        // 页面加载完成后自动开始测试
        document.addEventListener('DOMContentLoaded', () => {
            logResult('页面加载完成，准备开始测试', 'info');
        });
    </script>
</body>
</html>
