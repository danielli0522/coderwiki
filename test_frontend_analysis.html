<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码分析模块测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .test-success { background-color: #d4edda; color: #155724; }
        .test-error { background-color: #f8d7da; color: #721c24; }
        .test-info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>代码分析模块测试</h1>

        <div class="test-section">
            <h3>1. 基础功能测试</h3>
            <button id="testInit" class="btn btn-primary">测试初始化</button>
            <button id="testLoadRepos" class="btn btn-primary">测试加载仓库</button>
            <button id="testLoadStats" class="btn btn-primary">测试加载统计</button>
            <div id="testResults1"></div>
        </div>

        <div class="test-section">
            <h3>2. 仓库选择测试</h3>
            <select id="testRepoSelect" class="form-select mb-3">
                <option value="">请选择仓库</option>
            </select>
            <div id="testResults2"></div>
        </div>

        <div class="test-section">
            <h3>3. 分析功能测试</h3>
            <div class="mb-3">
                <label class="form-label">分析类型:</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="structureAnalysis" checked>
                    <label class="form-check-label" for="structureAnalysis">结构分析</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="techStackAnalysis" checked>
                    <label class="form-check-label" for="techStackAnalysis">技术栈分析</label>
                </div>
            </div>
            <button id="testStartAnalysis" class="btn btn-success">开始分析</button>
            <button id="testLoadResults" class="btn btn-info">加载结果</button>
            <div id="testResults3"></div>
        </div>

        <div class="test-section">
            <h3>4. 错误处理测试</h3>
            <button id="testInvalidRepo" class="btn btn-warning">测试无效仓库</button>
            <button id="testUnauthorized" class="btn btn-warning">测试无权限</button>
            <div id="testResults4"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/static/js/api_client.js"></script>
    <script src="frontend/static/js/analysis.js"></script>
    <script>
        let analysisManager;

        // 测试初始化
        document.getElementById('testInit').addEventListener('click', function() {
            try {
                analysisManager = new AnalysisManager();
                addTestResult('testResults1', 'success', 'AnalysisManager 初始化成功');
            } catch (error) {
                addTestResult('testResults1', 'error', '初始化失败: ' + error.message);
            }
        });

        // 测试加载仓库
        document.getElementById('testLoadRepos').addEventListener('click', async function() {
            if (!analysisManager) {
                addTestResult('testResults1', 'error', '请先初始化 AnalysisManager');
                return;
            }

            try {
                await analysisManager.loadRepositories();
                addTestResult('testResults1', 'success', '仓库加载成功，共 ' + analysisManager.userRepositories.length + ' 个仓库');

                // 更新测试用的仓库选择器
                const testSelect = document.getElementById('testRepoSelect');
                testSelect.innerHTML = '<option value="">请选择仓库</option>';
                analysisManager.userRepositories.forEach(repo => {
                    const option = document.createElement('option');
                    option.value = repo.id;
                    option.textContent = repo.name + (repo.clone_status === 'completed' ? ' (已克隆)' : ' (未克隆)');
                    testSelect.appendChild(option);
                });
            } catch (error) {
                addTestResult('testResults1', 'error', '仓库加载失败: ' + error.message);
            }
        });

        // 测试加载统计
        document.getElementById('testLoadStats').addEventListener('click', async function() {
            if (!analysisManager) {
                addTestResult('testResults1', 'error', '请先初始化 AnalysisManager');
                return;
            }

            try {
                await analysisManager.loadAnalysisStatistics();
                addTestResult('testResults1', 'success', '统计信息加载成功');
            } catch (error) {
                addTestResult('testResults1', 'error', '统计信息加载失败: ' + error.message);
            }
        });

        // 测试仓库选择
        document.getElementById('testRepoSelect').addEventListener('change', function() {
            const repoId = this.value;
            if (repoId && analysisManager) {
                analysisManager.selectRepository(repoId);
                addTestResult('testResults2', 'success', '选择了仓库: ' + repoId);
            }
        });

        // 测试开始分析
        document.getElementById('testStartAnalysis').addEventListener('click', async function() {
            if (!analysisManager || !analysisManager.repositoryId) {
                addTestResult('testResults3', 'error', '请先选择仓库');
                return;
            }

            try {
                await analysisManager.startAnalysis();
                addTestResult('testResults3', 'success', '分析已开始');
            } catch (error) {
                addTestResult('testResults3', 'error', '开始分析失败: ' + error.message);
            }
        });

        // 测试加载结果
        document.getElementById('testLoadResults').addEventListener('click', async function() {
            if (!analysisManager || !analysisManager.repositoryId) {
                addTestResult('testResults3', 'error', '请先选择仓库');
                return;
            }

            try {
                await analysisManager.loadAnalysisResults();
                addTestResult('testResults3', 'success', '结果加载完成');
            } catch (error) {
                addTestResult('testResults3', 'error', '结果加载失败: ' + error.message);
            }
        });

        // 测试无效仓库
        document.getElementById('testInvalidRepo').addEventListener('click', function() {
            if (analysisManager) {
                analysisManager.selectRepository(99999); // 不存在的仓库ID
                addTestResult('testResults4', 'info', '测试了无效仓库选择');
            }
        });

        // 测试无权限
        document.getElementById('testUnauthorized').addEventListener('click', async function() {
            if (!analysisManager) {
                addTestResult('testResults4', 'error', '请先初始化 AnalysisManager');
                return;
            }

            try {
                // 尝试访问不存在的分析结果
                await analysisManager.apiClient.get('/analysis/results/99999');
            } catch (error) {
                addTestResult('testResults4', 'info', '测试了无权限访问: ' + error.message);
            }
        });

        function addTestResult(containerId, type, message) {
            const container = document.getElementById(containerId);
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result test-${type}`;
            resultDiv.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            container.appendChild(resultDiv);
        }

        // 页面加载完成后自动初始化
        document.addEventListener('DOMContentLoaded', function() {
            analysisManager = new AnalysisManager();
            addTestResult('testResults1', 'info', '页面加载完成，AnalysisManager 已自动初始化');
        });
    </script>
</body>
</html>
